<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Konstrukce — workflow výkresů</title>
<style>
:root{
  --g:#0e8a43;--g2:#0a6b34;--g3:#12a350;--ink:#0f1512;--mut:#5b635c;--line:#e3e7e0;
  --bg:#eef1ec;--card:#fff;--red:#c23636;--amber:#b06f00;--blue:#1565c0;--purple:#6a1b9a;--gray:#78909c;
  --green-soft:#e6f6ec;
}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
.bar{background:#fff;border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.bar h1{font-size:17px;margin:0;font-weight:800;color:var(--g2)}
.bar .rolech{font-size:12px;font-weight:700;color:var(--g2);background:var(--green-soft);border:1px solid #bfe6cd;border-radius:20px;padding:3px 11px}
.bar .sp{flex:1}
.iconbtn{position:relative;border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px 10px;cursor:pointer;font-weight:600;color:#33513f}
.iconbtn:hover{background:#f0f3ee}
.badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:10px;font-size:11px;min-width:18px;height:18px;line-height:18px;text-align:center;padding:0 4px}
.wrap{display:flex;gap:0;align-items:flex-start}
.side{width:220px;min-width:220px;padding:16px 12px;position:sticky;top:57px;max-height:calc(100vh - 57px);overflow:auto}
.chip{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;border:0;background:transparent;border-radius:9px;padding:9px 11px;cursor:pointer;font-weight:600;color:#3a4a41;margin-bottom:2px}
.chip:hover{background:#e9efe6}
.chip.act{background:var(--g);color:#fff}
.chip .n{font-size:12px;opacity:.85}
.chip.act .n{opacity:1}
.grp{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:14px 8px 6px;font-weight:700}
.main{flex:1;padding:18px 22px;min-width:0}
.btn{border:0;border-radius:10px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;background:var(--g);color:#fff}
.btn:hover{background:var(--g2)}
.btn.ghost{background:#eef1ec;color:#33513f}.btn.ghost:hover{background:#e2e8dd}
.btn.sm{padding:7px 12px;font-size:13px}
.btn.warn{background:#fff;color:var(--red);border:1px solid var(--red)}
.btn.blue{background:var(--blue)}.btn.blue:hover{filter:brightness(.92)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.head h2{margin:0;font-size:20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:12px}
.zk{cursor:pointer;transition:box-shadow .12s}
.zk:hover{box-shadow:0 3px 12px rgba(0,0,0,.07)}
.zk .t{font-weight:700;font-size:15px}
.zk .sub{color:var(--mut);font-size:13px;margin-top:2px}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto}
.dot.green{background:var(--g3)}.dot.amber{background:var(--amber)}.dot.red{background:var(--red)}.dot.none{background:#cfd8d2}
.pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700}
.pill.novy{background:#eceff1;color:#455a64}
.pill.prace{background:#fff3e0;color:#e65100}
.pill.kontrola{background:#f3e5f5;color:#6a1b9a}
.pill.obchodnik{background:#e3f2fd;color:#1565c0}
.pill.klient{background:var(--green-soft);color:#0a6b34}
.pill.revize{background:#fff3e0;color:#e65100}
.pill.podklady{background:#eceff1;color:#607d8b}
.pill.schvaleno{background:var(--green-soft);color:#0a6b34}
.pill.vyroba{background:#e0f7fa;color:#00838f}
.pill.stredisko{background:#e0f7fa;color:#00838f}
.pill.dokonceno{background:#e0f2f1;color:#00695c}
.pill.zamitnuto{background:#fdecea;color:#c62828}
.muted{color:var(--mut)}
.empty{text-align:center;color:var(--mut);padding:50px 20px}
/* detail */
.ov{position:fixed;inset:0;background:rgba(20,28,24,.42);z-index:40;display:none}
.ov.open{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(680px,96vw);background:var(--bg);z-index:41;box-shadow:-4px 0 22px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .18s;overflow:auto}
.drawer.open{transform:none}
.dhead{background:#fff;border-bottom:1px solid var(--line);padding:16px 20px;position:sticky;top:0;z-index:2;display:flex;align-items:flex-start;gap:12px}
.dbody{padding:18px 20px}
.x{margin-left:auto;border:0;background:#eef1ec;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:18px;color:#33513f;flex:0 0 auto}
.kv{display:grid;grid-template-columns:130px 1fr;gap:5px 12px;font-size:13.5px}
.kv b{color:var(--mut);font-weight:600}
.sec{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-weight:700;margin:18px 0 8px}
.tl{border-left:2px solid var(--line);padding-left:14px;margin-left:4px}
.tl .it{position:relative;padding:0 0 12px}
.tl .it:before{content:'';position:absolute;left:-20px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--g3)}
.tl .it .m{font-size:12px;color:var(--mut)}
.cmt{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px}
.cmt.client{border-left:3px solid var(--g3)}
input,textarea,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff}
label{display:block;font-size:13px;font-weight:600;margin:10px 0 0}
.field{margin-bottom:4px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.modal{position:fixed;inset:0;background:rgba(20,28,24,.45);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto}
.modal.open{display:flex}
.sheet{background:#fff;border-radius:14px;width:min(720px,100%);padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.sheet h3{margin:0 0 4px}
.err{color:var(--red);font-size:13px;margin-top:8px}
.ok{color:var(--g);font-size:13px;margin-top:8px}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi .c{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.kpi .v{font-size:26px;font-weight:800;color:var(--g2)}
.kpi .l{font-size:12px;color:var(--mut);margin-top:2px}
.cap{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.capbar{flex:1;height:9px;background:#eceff1;border-radius:6px;overflow:hidden}
.capbar i{display:block;height:100%;border-radius:6px}
.notifpop{position:absolute;right:16px;top:54px;width:min(380px,92vw);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.16);z-index:30;max-height:70vh;overflow:auto;display:none}
.notifpop.open{display:block}
.notifpop .n{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px}
.notifpop .n.unread{background:#f1f8f2}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef1ec;color:#33513f}
/* workflow stepper + schéma */
.flow{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin:2px 0 10px}
.flow .st{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12.5px;font-weight:600;background:#fff;color:var(--mut)}
.flow .st .rd{width:9px;height:9px;border-radius:50%;background:#cfd8d2}
.flow .st.done{color:#3a4a41}
.flow .st.done .rd{background:var(--g3)}
.flow .st.cur{color:#fff;border-color:transparent}
.flow .st.cur .rd{background:rgba(255,255,255,.9)}
.flow .arw{color:#c3ccc4;font-size:13px}
.flow .dd{font-weight:700;font-size:11px;margin-left:3px;opacity:.6}
.r-sef{background:var(--purple)!important}.r-kon{background:#e65100!important}.r-obch{background:var(--blue)!important}.r-kli{background:var(--g)!important}.r-sys{background:var(--gray)!important}.r-vyr{background:#00838f!important}
.pdfwrap{background:#525659;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.pdfwrap iframe{width:100%;height:58vh;border:0;display:block}
.pdfbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:6px 0 14px;font-size:13px}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
.wf{display:flex;flex-wrap:wrap;align-items:stretch;gap:8px}
.wf .node{border-radius:12px;padding:12px 14px;color:#fff;min-width:150px;flex:0 0 auto}
.wf .node .t{font-weight:800;font-size:14px}
.wf .node .m{font-size:12px;opacity:.92;margin-top:3px}
.wf .arw{display:flex;align-items:center;color:#b6bfb7;font-size:20px;font-weight:700}
.wf .branch{border:1px dashed var(--line);border-radius:12px;padding:10px 12px;background:#fff;color:#3a4a41;min-width:150px;font-size:12.5px}
@media(max-width:820px){
  .wrap{flex-direction:column}
  .side{width:auto;min-width:0;position:static;max-height:none;display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff}
  .side .grp{display:none}
  .chip{width:auto;white-space:nowrap;flex:0 0 auto;margin-bottom:0;border:1px solid var(--line);padding:8px 12px}
  .chip.act{border-color:var(--g)}
  .chip .n{margin-left:6px}
  .main{padding:16px}
  .two{grid-template-columns:1fr}.kv{grid-template-columns:110px 1fr}
  .drawer{width:100vw}
}
</style>
</head>
<body>
<div class="bar">
  <h1>Konstrukce</h1>
  <span class="rolech" id="rolech">…</span>
  <span class="sp"></span>
  <button class="btn sm" id="newBtn" style="display:none" onclick="openNew()">+ Nová zakázka</button>
  <button class="iconbtn" onclick="toggleNotif()">🔔<span class="badge" id="nbadge" style="display:none">0</span></button>
  <button class="iconbtn" onclick="reloadData()" title="Obnovit">⟳</button>
</div>
<div class="notifpop" id="notifpop"></div>

<div class="wrap">
  <div class="side" id="side"></div>
  <div class="main" id="main"><p class="muted">Načítám…</p></div>
</div>

<div class="ov" id="ov" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<div class="modal" id="modal"></div>

<script>
var D=null, ME=null, FILTER='mine', SEL=null;
var TS={from:null,to:null,user:'',data:null,editing:null};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fdate(ts){if(!ts)return'—';var d=new Date(ts);function p(n){return(n<10?'0':'')+n}return p(d.getUTCDate())+'.'+p(d.getUTCMonth()+1)+'.'+d.getUTCFullYear()}
function fdt(ts){if(!ts)return'—';var d=new Date(ts);function p(n){return(n<10?'0':'')+n}return fdate(ts)+' '+p(d.getUTCHours())+':'+p(d.getUTCMinutes())}
function hhmm(sec){sec=sec||0;var h=Math.floor(sec/3600),m=Math.round((sec%3600)/60);return h+'h '+(m<10?'0':'')+m+'m'}
function roleLabel(r){return{obchodnik:'Obchodník',sef:'Šéf konstrukce',konstrukter:'Konstruktér',reditel:'Ředitel','sef-vyroby':'Šéf výroby',admin:'Správce'}[r]||r||'—'}
function api(path,method,body){return fetch('/api/konstrukce'+path,{method:method||'GET',headers:body?{'Content-Type':'application/json'}:undefined,body:body?JSON.stringify(body):undefined,cache:'no-store'}).then(function(r){return r.json().then(function(j){return{ok:r.ok,status:r.status,j:j}})})}

function isPriv(){return ME.isAdmin||ME.role==='sef'||ME.role==='reditel'}
function canCreate(){return ME.isAdmin||ME.role==='obchodnik'}

function reloadData(){
  api('/data').then(function(o){
    if(!o.ok){document.getElementById('main').innerHTML='<div class="empty">'+esc(o.j.chyba||'Chyba načtení.')+'</div>';return}
    D=o.j; ME=o.j.me;
    document.getElementById('rolech').textContent=roleLabel(ME.role);
    document.getElementById('newBtn').style.display=canCreate()?'':'none';
    var nb=document.getElementById('nbadge');
    if(D.notifUnread){nb.style.display='';nb.textContent=D.notifUnread}else nb.style.display='none';
    renderSide(); renderMain();
    if(SEL){var z=D.zakazky.find(function(x){return x.id===SEL});if(z)renderDrawer(z);}
  });
}

/* ---- levý filtr ---- */
function counts(){
  var z=D.zakazky, me=ME.email;
  return {
    mine:z.filter(function(x){return x.responsible===me&&!isTerminal(x.stav)}).length,
    novy:z.filter(function(x){return x.stav==='novy'}).length,
    prace:z.filter(function(x){return x.stav==='prace'||x.stav==='revize'}).length,
    kontrola:z.filter(function(x){return x.stav==='kontrola'}).length,
    obchodnik:z.filter(function(x){return x.stav==='obchodnik'}).length,
    klient:z.filter(function(x){return x.stav==='klient'}).length,
    vyr:z.filter(function(x){return x.stav==='vyroba'||x.stav==='stredisko'}).length,
    red:z.filter(function(x){return x.semafor==='red'}).length,
    open:z.filter(function(x){return !isTerminal(x.stav)}).length,
    all:z.length
  };
}
function isTerminal(s){return s==='dokonceno'||s==='zamitnuto'}
function renderSide(){
  var c=counts(), h='';
  function chip(key,label,n,cls){return '<button class="chip'+(FILTER===key?' act':'')+'" onclick="setFilter(\''+key+'\')"><span>'+label+'</span><span class="n">'+(n||0)+'</span></button>'}
  h+='<div class="grp">Práce</div>';
  h+=chip('mine','Na tahu u mě',c.mine);
  if(ME.isAdmin||ME.role==='sef'){h+=chip('novy','Nové k přidělení',c.novy);h+=chip('kontrola','Interní kontrola',c.kontrola);}
  if(ME.isAdmin||ME.role==='konstrukter'||ME.role==='sef'){h+=chip('prace','Ve zkreslení',c.prace);}
  if(ME.isAdmin||ME.role==='obchodnik'||ME.role==='sef'){h+=chip('obchodnik','U obchodníka',c.obchodnik);h+=chip('klient','U klienta',c.klient);}
  if(ME.isAdmin||ME.role==='sef-vyroby'||ME.role==='sef'||ME.role==='reditel'){h+=chip('vyroba','Ve výrobě',c.vyr);}
  h+='<div class="grp">Přehled</div>';
  h+=chip('red','Po termínu',c.red);
  h+=chip('open','Otevřené',c.open);
  h+=chip('all','Vše',c.all);
  h+='<button class="chip'+(FILTER==='workflow'?' act':'')+'" onclick="setFilter(\'workflow\')"><span>Postup (schéma)</span></button>';
  if(ME.isAdmin||ME.role==='sef'){h+='<div class="grp">Konstrukce</div>';h+='<button class="chip'+(FILTER==='kapacity'?' act':'')+'" onclick="setFilter(\'kapacity\')"><span>Kapacity</span></button>';}
  if(ME.isAdmin||ME.role==='reditel'){h+='<button class="chip'+(FILTER==='kpi'?' act':'')+'" onclick="setFilter(\'kpi\')"><span>KPI ředitele</span></button>';}
  if(ME.isAdmin||ME.role==='konstrukter'||ME.role==='sef'||ME.role==='reditel'){h+='<div class="grp">Evidence</div>';h+='<button class="chip'+(FILTER==='evidence'?' act':'')+'" onclick="setFilter(\'evidence\')"><span>Evidence práce</span></button>';}
  if(ME.isAdmin){h+='<div class="grp">Správa</div>';h+='<button class="chip'+(FILTER==='nastaveni'?' act':'')+'" onclick="setFilter(\'nastaveni\')"><span>Role a číselník</span></button>';}
  document.getElementById('side').innerHTML=h;
}
function setFilter(f){FILTER=f;renderSide();renderMain();window.scrollTo(0,0)}

/* ---- hlavní obsah ---- */
function filtered(){
  var z=D.zakazky.slice(), me=ME.email;
  if(FILTER==='mine')return z.filter(function(x){return x.responsible===me&&!isTerminal(x.stav)});
  if(FILTER==='novy')return z.filter(function(x){return x.stav==='novy'});
  if(FILTER==='prace')return z.filter(function(x){return x.stav==='prace'||x.stav==='revize'});
  if(FILTER==='kontrola')return z.filter(function(x){return x.stav==='kontrola'});
  if(FILTER==='obchodnik')return z.filter(function(x){return x.stav==='obchodnik'});
  if(FILTER==='klient')return z.filter(function(x){return x.stav==='klient'});
  if(FILTER==='vyroba')return z.filter(function(x){return x.stav==='vyroba'||x.stav==='stredisko'});
  if(FILTER==='red')return z.filter(function(x){return x.semafor==='red'});
  if(FILTER==='open')return z.filter(function(x){return !isTerminal(x.stav)});
  return z;
}
function renderMain(){
  var m=document.getElementById('main');
  if(FILTER==='kapacity')return renderKapacity(m);
  if(FILTER==='kpi')return renderKpi(m);
  if(FILTER==='workflow')return renderWorkflow(m);
  if(FILTER==='evidence')return renderTimesheet(m);
  if(FILTER==='nastaveni')return renderNastaveni(m);
  var titleMap={mine:'Na tahu u mě',novy:'Nové k přidělení',prace:'Ve zkreslení',kontrola:'Interní kontrola',obchodnik:'U obchodníka',klient:'U klienta',vyroba:'Ve výrobě',red:'Po termínu',open:'Otevřené zakázky',all:'Všechny zakázky'};
  var list=filtered();
  var h='<div class="head"><h2>'+esc(titleMap[FILTER]||'Zakázky')+' <span class="muted" style="font-weight:400;font-size:15px">('+list.length+')</span></h2></div>';
  if(!list.length){h+='<div class="empty">Žádné zakázky v této složce.</div>';m.innerHTML=h;return}
  list.forEach(function(z){h+=zkCard(z)});
  m.innerHTML=h;
}
function zkCard(z){
  var right=(z.deadline&&!isTerminal(z.stav)&&z.stav!=='schvaleno')?('<span class="muted" style="font-size:12.5px">termín '+fdate(z.deadline)+'</span>'):'';
  return '<div class="card zk" onclick="openDrawer(\''+z.id+'\')">'+
    '<div class="row" style="justify-content:space-between">'+
      '<div class="row"><span class="dot '+z.semafor+'"></span><div><div class="t">'+esc(z.cislo)+' · '+esc(z.zakaznik)+'</div>'+
      '<div class="sub">'+esc(z.typName)+' · v'+(z.versionCount||0)+(z.assignedName?(' · '+esc(z.assignedName)):'')+'</div></div></div>'+
      '<div style="text-align:right"><span class="pill '+z.stav+'">'+esc(z.stavLabel)+'</span><div class="sub" style="margin-top:4px">'+esc(z.responsibleName||'—')+' '+right+'</div></div>'+
    '</div></div>';
}

/* ---- kapacity ---- */
function renderKapacity(m){
  var h='<div class="head"><h2>Kapacity konstruktérů</h2></div>';
  var k=D.kapacita||[];
  if(!k.length){h+='<div class="empty">Zatím nejsou přiřazeni žádní konstruktéři. Přiřaďte role v sekci <b>Role a číselník</b>.</div>';m.innerHTML=h;return}
  h+='<div class="card">';
  k.forEach(function(r){
    var col=r.vytizeni>=100?'var(--red)':(r.vytizeni>=70?'var(--amber)':'var(--g3)');
    h+='<div class="cap"><div style="width:170px"><b>'+esc(r.name)+'</b><div class="sub">'+r.tasks+' úkolů · '+r.nh+' Nh · fond '+r.fondTyden+' h/týd</div></div>'+
       '<div class="capbar"><i style="width:'+Math.min(100,r.vytizeni)+'%;background:'+col+'"></i></div><div style="width:52px;text-align:right;font-weight:700;color:'+col+'">'+r.vytizeni+'%</div></div>';
  });
  h+='</div><p class="muted">Vytížení = zbývající normohodiny přidělených úkolů vůči dostupnému fondu. Nejméně vytížený je nahoře — jeho systém doporučuje při přidělování.</p>';
  m.innerHTML=h;
}

/* ---- KPI ---- */
function renderKpi(m){
  var z=D.zakazky;
  var done=z.filter(function(x){return x.stav==='dokonceno'||x.stav==='schvaleno'});
  var leads=[];
  z.forEach(function(x){
    var appr=(x.audit||[]).find(function(a){return a.action==='Klient schválil'});
    if(appr)leads.push((appr.at-x.createdAt)/86400000);
  });
  var avgLead=leads.length?(leads.reduce(function(a,b){return a+b},0)/leads.length):0;
  var revs=z.map(function(x){return x.revisionCount||0});
  var avgRev=revs.length?(revs.reduce(function(a,b){return a+b},0)/revs.length):0;
  var overdue=z.filter(function(x){return x.semafor==='red'}).length;

  var onTime=done.length?Math.round(done.filter(function(x){return (x.semafor!=='red')}).length/done.length*100):100;

    kc(avgLead?avgLead.toFixed(1)+' d':'—','Průměrný lead time')+
    kc(avgRev.toFixed(2),'Revizí / zakázka')+
    kc(done.length,'Schváleno / dokončeno')+'</div>';
  // rozpad podle stavu
  var byStav={};z.forEach(function(x){byStav[x.stavLabel]=(byStav[x.stavLabel]||0)+1});

  m.innerHTML=h;
}

function stepDays(z){
  var order=['novy','prace','kontrola','obchodnik','klient','schvaleno','vyroba','stredisko','dokonceno'];
  var starts={novy:z.createdAt};
  var map=[['Přidělení','prace'],['Zkreslení hotovo','kontrola'],['Interní kontrola OK','obchodnik'],['Odesláno klientovi','klient'],['Klient schválil','schvaleno'],['Předáno do výroby','vyroba'],['Přiděleno výrobní středisko','stredisko']];
  (z.audit||[]).forEach(function(a){
    var ac=a.action||'';
    map.forEach(function(m){if(ac.indexOf(m[0])>=0)starts[m[1]]=a.at});
    if(ac.indexOf('Vyrobeno')>=0||ac.indexOf('Dokončeno')>=0)starts.dokonceno=a.at;
  });
  var days={};
  order.forEach(function(k,i){
    if(starts[k]==null||k==='dokonceno')return;
    var end=null;
    for(var j=i+1;j<order.length;j++){if(starts[order[j]]!=null){end=starts[order[j]];break}}
    if(end==null)end=Date.now();
    days[k]=Math.max(0,Math.round((end-starts[k])/86400000));
  });
  return days;
}
function stepFlow(z){
  var stages=[{k:'novy',l:'Nový',r:'sef'},{k:'prace',l:'Zkreslení',r:'kon'},{k:'kontrola',l:'Kontrola',r:'sef'},{k:'obchodnik',l:'Obchodník',r:'obch'},{k:'klient',l:'U klienta',r:'kli'},{k:'schvaleno',l:'Schváleno',r:'kli'},{k:'vyroba',l:'Do výroby',r:'vyr'},{k:'stredisko',l:'Středisko',r:'vyr'},{k:'dokonceno',l:'Vyrobeno',r:'sys'}];
  var order=stages.map(function(s){return s.k});
  var cur=z.stav, eff=cur;
  if(cur==='revize')eff='prace';
  if(cur==='podklady')eff=z.prevStav||'prace';
  if(cur==='zamitnuto')eff='';
  var ci=order.indexOf(eff);
  var days=stepDays(z);
  var h='<div class="flow">';
  stages.forEach(function(s,i){
    var cls='st';
    if(ci>=0&&i<ci)cls+=' done';
    else if(i===ci)cls+=' cur r-'+s.r;
    var label=s.l;
    if(i===ci&&cur==='revize')label='Revize v'+z.versionCount;
    if(i===ci&&cur==='stredisko'&&z.strediskoName)label=z.strediskoName;
    var dtxt=(days[s.k]!=null)?(' <span class="dd">'+days[s.k]+' d</span>'):'';
    h+=(i?'<span class="arw">→</span>':'')+'<span class="'+cls+'"><span class="rd"></span>'+esc(label)+dtxt+'</span>';
  });
  h+='</div>';
  if(cur==='podklady')h+='<div style="margin:-4px 0 8px;color:var(--amber);font-size:13px;font-weight:600">⏸ Pozastaveno — čeká na podklady'+(z.holdReason?': '+esc(z.holdReason):'')+'</div>';
  if(cur==='zamitnuto')h+='<div style="margin:-4px 0 8px;color:var(--red);font-size:13px;font-weight:600">✕ Zamítnuto / storno</div>';
  return h;
}

/* ---- akce dle role a stavu ---- */
function actionsFor(z){
  var me=ME, h='', canObch=me.isAdmin||(me.role==='obchodnik'&&z.obchodnikEmail===me.email);
  var canSef=me.isAdmin||me.role==='sef';

  if(z.stav==='novy'&&canSef){blocks.push(assignBlock(z))}

  if((z.stav==='prace'||z.stav==='revize')&&canKon){blocks.push(konstrukterBlock(z))}
  if((z.stav==='prace'||z.stav==='revize')&&canSef&&!canKon){blocks.push('<div class="actions">'+assignReassign(z)+'</div>')}

  if(z.stav==='kontrola'&&canSef){blocks.push(

    '<div class="actions"><button class="btn sm" onclick="doAction(\''+z.id+'\',\'kontrola-ok\',\'kontrolaNote\')">✓ V pořádku → obchodník</button>'+
    '<button class="btn warn sm" onclick="doAction(\''+z.id+'\',\'kontrola-vrat\',\'kontrolaNote\')">↩ Vrátit konstruktérovi</button></div></div>')}

  if(z.stav==='obchodnik'&&canObch){blocks.push(obchodnikBlock(z))}

  if(z.stav==='klient'&&canObch){blocks.push(
    '<div class="card" style="background:#eef7f0"><b>U klienta</b><p class="muted" style="margin:6px 0">Odkaz odeslán klientovi'+(z.link?(', platí do '+fdate(z.link.expiresAt)+', '+z.link.accesses+'× otevřen'):'')+'. Čekáme na jeho rozhodnutí.</p>'+
    '<div class="actions"><button class="btn ghost sm" onclick="copyLink(\''+(z.link?z.link.url:'')+'\')">Kopírovat odkaz</button>'+
    '<button class="btn warn sm" onclick="askStorno(\''+z.id+'\')">Storno</button></div></div>')}

  if(z.stav==='schvaleno'&&(canSef||canObch)){blocks.push('<div class="card" style="background:#e6f6ec"><b>Schváleno klientem ✓</b><p class="muted" style="margin:6px 0">Výkres je uzamčen. Předejte zakázku do výroby — dostane ji šéf výroby k přidělení střediska.</p><div class="actions"><button class="btn sm" onclick="doAction(\''+z.id+'\',\'predat-vyrobe\')">→ Předat do výroby</button></div></div>')}

  if(z.stav==='vyroba'&&canVyr){blocks.push(vyrobaBlock(z,'Přidělit výrobní středisko'))}
  if(z.stav==='stredisko'&&canVyr){blocks.push(
    '<div class="card" style="background:#e0f7fa"><b>Ve výrobním středisku'+(z.strediskoName?' — '+esc(z.strediskoName):'')+'</b>'+
    '<div class="actions" style="margin-top:8px"><button class="btn sm" onclick="doAction(\''+z.id+'\',\'vyrobeno\')">✓ Vyrobeno — dokončit</button></div>'+
    '<div style="border-top:1px solid var(--line);margin:10px 0"></div>'+vyrobaBlock(z,'Přeřadit na jiné středisko',true)+'</div>')}

  // pozastavení / obnovení
  if(!isTerminal(z.stav)&&z.stav!=='schvaleno'){
    if(z.stav==='podklady'&&(canObch||canSef))blocks.push('<div class="actions"><button class="btn sm" onclick="doAction(\''+z.id+'\',\'unhold\')">▶ Podklady doplněny — pokračovat</button></div>');
    else if(z.stav!=='podklady'&&(canObch||canSef))blocks.push('<div class="actions" style="margin-top:4px"><button class="btn ghost sm" onclick="askHold(\''+z.id+'\')">⏸ Čeká na podklady</button>'+((canObch||canSef)?'<button class="btn ghost sm" onclick="askTermin(\''+z.id+'\')">Změnit termín</button>':'')+((me.role==='obchodnik'||me.role==='reditel'||me.isAdmin)?'<button class="btn warn sm" onclick="askStorno(\''+z.id+'\')">Storno</button>':'')+'</div>');
  }
  h=blocks.join('');
  return h;
}

/* ---- evidence práce (timesheet) ---- */
function monthStart(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function hnum(h){return (Math.round((h||0)*10)/10).toString().replace('.',',')}
function renderTimesheet(m){
  if(!TS.from){TS.from=monthStart();TS.to=todayStr()}
  m.innerHTML='<div class="head"><h2>Evidence práce</h2></div><p class="muted">Načítám…</p>';
  var qs='from='+TS.from+'&to='+TS.to+(TS.user?('&user='+encodeURIComponent(TS.user)):'');
  api('/timesheet?'+qs).then(function(o){
    if(!o.ok){m.innerHTML='<div class="empty">'+esc(o.j.chyba||'Chyba.')+'</div>';return}
    TS.data=o.j; drawTimesheet(m);
  });
}
function drawTimesheet(m){
  var j=TS.data, e=j.entries, all=j.me.canSeeAll;
  // souhrny
  var tot=0,zak=0,rez=0,days={};
  e.forEach(function(x){tot+=x.hours;if(x.kind==='zakazka')zak+=x.hours;else rez+=x.hours;days[x.date]=1});
  var nd=Object.keys(days).length;
  // reporty
  var byAct={},byZak={};
  e.forEach(function(x){byAct[x.activity]=(byAct[x.activity]||0)+x.hours;var k=x.zakCislo||x.zakazka;if(k)byZak[k]=(byZak[k]||0)+x.hours});
  var actRows=Object.keys(byAct).map(function(k){return [k,byAct[k]]}).sort(function(a,b){return b[1]-a[1]});
  var zakRows=Object.keys(byZak).map(function(k){return [k,byZak[k]]}).sort(function(a,b){return b[1]-a[1]}).slice(0,15);

  var h='<div class="head"><h2>Evidence práce</h2><div class="row">'+
    '<input type="date" value="'+TS.from+'" onchange="TS.from=this.value;renderMain()" style="width:150px">'+
    '<span class="muted">–</span><input type="date" value="'+TS.to+'" onchange="TS.to=this.value;renderMain()" style="width:150px">'+
    (all?userFilter(j):'')+'</div></div>';

  // formulář zápisu
  h+=tsForm(j);

  // KPI karty
  h+='<div class="kpi">'+kc(hnum(tot)+' h','Celkem hodin')+kc(hnum(zak)+' h','Na zakázky')+kc(hnum(rez)+' h','Režie')+kc(nd,'Dní se zápisem')+kc(e.length,'Záznamů')+'</div>';

  // reporty
  h+='<div class="two"><div><div class="sec">Hodiny podle činnosti</div><div class="card">'+
    (actRows.length?actRows.map(function(r){return repRow(r[0],r[1],tot)}).join(''):'<p class="muted" style="margin:0">Žádná data.</p>')+'</div></div>'+
    '<div><div class="sec">Top zakázky podle hodin</div><div class="card">'+
    (zakRows.length?zakRows.map(function(r){return repRow(r[0],r[1],tot)}).join(''):'<p class="muted" style="margin:0">Žádná data.</p>')+'</div></div></div>';

  // seznam záznamů podle dní
  h+='<div class="sec">Záznamy ('+e.length+')</div>';
  if(!e.length)h+='<div class="empty">V tomto období nejsou žádné záznamy.</div>';
  else{
    var curd='';
    e.forEach(function(x){
      if(x.date!==curd){curd=x.date;h+='<div class="muted" style="font-weight:700;margin:12px 0 4px">'+fdate(new Date(x.date+'T00:00:00Z').getTime())+(all?'':'')+'</div>'}
      h+='<div class="card" style="padding:9px 12px;margin-bottom:6px"><div class="row" style="justify-content:space-between">'+
        '<div style="min-width:0"><b>'+esc(x.activity)+'</b> <span class="tag">'+(x.kind==='zakazka'?'zakázka':'režie')+'</span>'+
        (x.zakCislo||x.zakazka?'<div class="sub">'+esc(x.zakCislo||x.zakazka)+(x.percent!=null?(' · '+x.percent+' %'):'')+(x.note?(' · '+esc(x.note)):'')+'</div>':(x.note?'<div class="sub">'+esc(x.note)+'</div>':''))+
        (all?'<div class="sub" style="opacity:.7">'+esc(x.userName||x.user)+'</div>':'')+'</div>'+
        '<div class="row" style="gap:6px"><b style="white-space:nowrap">'+hnum(x.hours)+' h</b>'+
        ((all||x.user===ME.email)?'<button class="btn ghost sm" onclick="tsEdit(\''+x.id+'\')">Upravit</button><button class="btn warn sm" onclick="tsDelete(\''+x.id+'\')">×</button>':'')+'</div>'+
      '</div></div>';
    });
  }
  m.innerHTML=h;
}
function userFilter(j){
  var opts='<option value="">Všichni</option>';
  (j.users||[]).forEach(function(u){opts+='<option value="'+esc(u.email)+'"'+(TS.user===u.email?' selected':'')+'>'+esc(u.name)+' ('+hnum(u.hours)+' h)</option>'});
  return '<select onchange="TS.user=this.value;renderMain()" style="width:auto">'+opts+'</select>';
}
function repRow(label,hours,tot){
  var pct=tot>0?Math.round(hours/tot*100):0;
  return '<div style="padding:5px 0;border-bottom:1px solid var(--line)"><div class="row" style="justify-content:space-between"><span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(label)+'</span><b style="white-space:nowrap">'+hnum(hours)+' h · '+pct+' %</b></div>'+
    '<div class="capbar" style="margin-top:3px"><i style="width:'+pct+'%;background:var(--g3)"></i></div></div>';
}
function tsForm(j){
  var ed=TS.editing;
  var actOpts=(j.activities||[]).map(function(a){return '<option value="'+esc(a.key)+'"'+(ed&&ed.activityKey===a.key?' selected':'')+'>'+esc(a.label)+(a.kind==='rezie'?' (režie)':'')+'</option>'}).join('');
  var zakOpts='<option value="">— bez zakázky (režie) / vlastní kód —</option>'+(j.zakazky||[]).map(function(z){return '<option value="'+esc(z.id)+'"'+(ed&&ed.zakId===z.id?' selected':'')+'>'+esc(z.cislo)+' · '+esc(z.zakaznik)+'</option>'}).join('');
  var userSel='';
  if(j.me.canSeeAll){var uo=(j.users||[]).map(function(u){return '<option value="'+esc(u.email)+'"'+(ed&&ed.user===u.email?' selected':'')+'>'+esc(u.name)+'</option>'}).join('');
    userSel='<div><label>Konstruktér</label><input id="tsUser" list="tsUsers" value="'+esc(ed?ed.user:(TS.user||''))+'" placeholder="e-mail"><datalist id="tsUsers">'+uo+'</datalist></div>';}
  return '<div class="card" style="background:#f3faf5"><b>'+(ed?'Upravit záznam':'Přidat záznam')+'</b>'+
    '<div class="two" style="margin-top:8px"><div><label>Datum</label><input type="date" id="tsDate" value="'+(ed?ed.date:todayStr())+'"></div>'+
    '<div><label>Druh práce</label><select id="tsAct">'+actOpts+'</select></div></div>'+
    '<div class="two"><div><label>Zakázka (workflow)</label><select id="tsZak" onchange="if(this.value)document.getElementById(\'tsZakFree\').value=\'\'">'+zakOpts+'</select></div>'+
    '<div><label>…nebo vlastní kód zakázky</label><input id="tsZakFree" value="'+esc(ed?ed.zakazka:'')+'" placeholder="např. 25B876 nebo ABR-…"></div></div>'+
    '<div class="two">'+userSel+'<div class="two" style="gap:12px"><div><label>Hodiny</label><input id="tsHours" inputmode="decimal" value="'+(ed?hnum(ed.hours):'')+'" placeholder="2,5"></div><div><label>% dokončení</label><input id="tsPct" inputmode="numeric" value="'+(ed&&ed.percent!=null?ed.percent:'')+'" placeholder="volitelné"></div></div></div>'+
    '<label>Poznámka</label><input id="tsNote" value="'+esc(ed?ed.note:'')+'" placeholder="volitelné">'+
    '<div class="err" id="tsErr"></div>'+
    '<div class="actions" style="margin-top:10px"><button class="btn sm" onclick="tsSave()">'+(ed?'Uložit změny':'Přidat záznam')+'</button>'+(ed?'<button class="btn ghost sm" onclick="TS.editing=null;renderMain()">Zrušit úpravu</button>':'')+'</div></div>';
}
function tsSave(){
  function v(id){return (document.getElementById(id)||{}).value}
  var b={id:TS.editing?TS.editing.id:'',date:v('tsDate'),activityKey:v('tsAct'),zakId:v('tsZak'),zakazka:v('tsZakFree'),hours:v('tsHours'),percent:v('tsPct'),note:v('tsNote')};
  if(TS.data.me.canSeeAll){var uu=v('tsUser');if(uu)b.user=uu}
  var err=document.getElementById('tsErr');err.textContent='';
  if(!b.hours){err.textContent='Zadejte hodiny.';return}
  api('/timesheet','POST',b).then(function(o){if(!o.ok){err.textContent=o.j.chyba||'Chyba.';return}TS.editing=null;renderMain()});
}
function tsEdit(id){var x=(TS.data.entries||[]).find(function(e){return e.id===id});if(!x)return;TS.editing=x;renderMain();window.scrollTo(0,0)}
function tsDelete(id){if(!confirm('Smazat záznam?'))return;api('/timesheet/delete','POST',{id:id}).then(function(o){if(!o.ok){alert(o.j.chyba);return}renderMain()})}

  (D.types||[]).forEach(function(t){
    h+='<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div class="row" style="justify-content:space-between"><b>'+esc(t.name)+'</b><span class="muted">'+esc(t.key)+'</span></div>'+
      '<div class="sub">Zkreslení '+(t.lhutaZkresleniDays||'?')+' d / '+(t.normohodiny||'?')+' Nh · revize '+(t.lhutaRevizeDays||'?')+' d / '+(t.revizeNh||'?')+' Nh · interní kontrola '+(t.internalCheck?'ano':'ne')+' · odkaz '+(t.linkValidDays||30)+' d</div>'+
      '<div class="actions" style="margin-top:6px"><button class="btn ghost sm" onclick="editTyp(\''+esc(t.key)+'\')">Upravit</button></div></div>';
  });
  h+='<div class="actions" style="margin-top:10px"><button class="btn sm" onclick="editTyp(\'\')">+ Nový typ výrobku</button></div></div>';
  h+='<div class="sec">Výrobní střediska</div><div class="card"><p class="muted" style="margin-top:0">Střediska, kterým šéf výroby přiděluje schválené zakázky do výroby.</p>';
  (D.strediska||[]).forEach(function(s){
    h+='<div class="row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)"><b>'+esc(s.label)+'</b><button class="btn ghost sm" onclick="delStredisko(\''+esc(s.key)+'\')">×</button></div>';
  });
  h+='<div class="row" style="margin-top:10px"><input id="strLabel" placeholder="Název střediska"><button class="btn sm" onclick="addStredisko()">+ Přidat středisko</button></div></div>';
  h+='<div class="sec">Druhy práce (evidence)</div><div class="card">';
  (D.activities||[]).forEach(function(a){
    h+='<div class="row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)"><span><b>'+esc(a.label)+'</b> <span class="tag">'+(a.kind==='zakazka'?'zakázka':'režie')+'</span></span>'+
      '<button class="btn ghost sm" onclick="delActivity(\''+esc(a.key)+'\')">×</button></div>';
  });
  h+='<div class="two" style="margin-top:10px"><input id="naLabel" placeholder="Název nové činnosti"><select id="naKind"><option value="zakazka">na zakázku</option><option value="rezie">režie</option></select></div>'+
    '<div class="actions" style="margin-top:8px"><button class="btn sm" onclick="addActivity()">+ Přidat činnost</button></div></div>';
  h+='<div class="sec">Import historické evidence</div><div class="card"><p class="muted" style="margin-top:0">Naimportuje záznamy práce z původní tabulky (799 řádků, 1–7/2026) na zadaného konstruktéra. „Nahradit" nejdřív smaže jeho stávající záznamy.</p>'+
    '<div class="two"><div><label>E-mail konstruktéra</label><input id="impUser" placeholder="jmeno@elkoplast.cz"></div>'+
    '<div><label>Režim</label><select id="impMode"><option value="append">Přidat k existujícím</option><option value="replace">Nahradit jeho záznamy</option></select></div></div>'+
    '<div class="actions" style="margin-top:8px"><button class="btn sm" onclick="importEvidence()">Naimportovat historii</button></div><div class="err" id="impErr"></div></div>';
  h+='<div class="sec">Ukázková data</div><div class="card"><p class="muted" style="margin-top:0">Nahraje ilustrativní scénář (7 zakázek napříč stavy, role, kapacity, notifikace) pro vyzkoušení modulu. Vše lze pak jedním tlačítkem smazat.</p>'+
    '<div class="actions"><button class="btn sm" onclick="seedDemo(\'load\')">Nahrát ukázkový scénář</button><button class="btn warn sm" onclick="seedDemo(\'clear\')">Smazat všechna data</button></div></div>';
  m.innerHTML=h;
}
function addActivity(){
  var label=(document.getElementById('naLabel')||{}).value||'';var kind=(document.getElementById('naKind')||{}).value||'rezie';
  if(!label.trim())return;
  var key=label.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,30);
  api('/admin/activity','POST',{key:key,label:label,kind:kind}).then(function(o){if(!o.ok){alert(o.j.chyba);return}reloadData();renderMain()});
}
function delActivity(key){if(!confirm('Smazat činnost z číselníku? (existující záznamy zůstanou)'))return;api('/admin/activity','POST',{key:key,delete:true}).then(function(){reloadData();renderMain()})}
function addStredisko(){
  var label=(document.getElementById('strLabel')||{}).value||'';if(!label.trim())return;
  var key=label.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,30);
  api('/admin/stredisko','POST',{key:key,label:label}).then(function(o){if(!o.ok){alert(o.j.chyba);return}reloadData();renderMain()});
}
function delStredisko(key){if(!confirm('Smazat výrobní středisko?'))return;api('/admin/stredisko','POST',{key:key,delete:true}).then(function(){reloadData();renderMain()})}
function importEvidence(){
  var user=(document.getElementById('impUser')||{}).value||'';var mode=(document.getElementById('impMode')||{}).value||'append';
  var err=document.getElementById('impErr');err.textContent='';
  if(!user.trim()){err.textContent='Zadejte e-mail konstruktéra.';return}
  if(mode==='replace'&&!confirm('Nahradit VŠECHNY dosavadní záznamy uživatele '+user+' importem?'))return;
  err.textContent='Importuji…';
  api('/admin/import','POST',{user:user.trim().toLowerCase(),mode:mode}).then(function(o){if(!o.ok){err.textContent=o.j.chyba||'Chyba.';return}err.textContent='';alert('Naimportováno '+o.j.count+' záznamů. Otevřete „Evidence práce".')});
}
function seedDemo(mode){
  if(mode==='clear'&&!confirm('Opravdu smazat VŠECHNA data modulu (zakázky, role i kapacity)? Tuto akci nelze vzít zpět.'))return;
  api('/admin/seed','POST',{mode:mode}).then(function(o){
    if(!o.ok){alert(o.j.chyba||'Chyba.');return}
    reloadData();
    alert(mode==='clear'?'Všechna data modulu byla smazána.':'Nahráno '+o.j.count+' ukázkových zakázek. Projděte si je ve složce „Vše".');
    if(mode!=='clear')setFilter('all');
  });
}
function setRole(email,role){api('/admin/role','POST',{email:email,role:role}).then(function(o){if(!o.ok){alert(o.j.chyba);return}reloadData()})}
function setFond(email,fond){api('/admin/fond','POST',{email:email,fond:fond}).then(function(){reloadData()})}
function editTyp(key){
  var t=(D.types||[]).find(function(x){return x.key===key})||{key:'',name:'',normohodiny:8,revizeNh:2,lhutaZkresleniDays:3,lhutaRevizeDays:2,lhutaPrideleniDays:1,lhutaKontrolaDays:1,lhutaObchodnikDays:1,lhutaKlientDays:5,linkValidDays:30,internalCheck:true,params:[]};
  var m=document.getElementById('modal');
  function num(id,l,v){return '<div><label>'+l+'</label><input id="'+id+'" type="number" value="'+(v==null?'':v)+'"></div>'}
  m.innerHTML='<div class="sheet"><h3>'+(key?'Upravit typ výrobku':'Nový typ výrobku')+'</h3>'+
    '<div class="two"><div><label>Klíč (bez mezer)</label><input id="tKey" value="'+esc(t.key)+'"'+(key?' readonly':'')+'></div><div><label>Název</label><input id="tName" value="'+esc(t.name)+'"></div></div>'+
    '<div class="two">'+num('tNh','Normohodiny zkreslení',t.normohodiny)+num('tRnh','Normohodiny revize',t.revizeNh)+'</div>'+
    '<div class="two">'+num('tZd','Lhůta zkreslení (dny)',t.lhutaZkresleniDays)+num('tRd','Lhůta revize (dny)',t.lhutaRevizeDays)+'</div>'+
    '<div class="two">'+num('tPd','Lhůta přidělení',t.lhutaPrideleniDays)+num('tKd','Lhůta kontroly',t.lhutaKontrolaDays)+'</div>'+
    '<div class="two">'+num('tOd','Lhůta obchodník',t.lhutaObchodnikDays)+num('tCd','Lhůta reakce klienta',t.lhutaKlientDays)+'</div>'+
    '<div class="two">'+num('tLv','Platnost odkazu (dny)',t.linkValidDays)+'<div><label>Interní kontrola</label><select id="tIc"><option value="1"'+(t.internalCheck?' selected':'')+'>ano (povinná)</option><option value="0"'+(!t.internalCheck?' selected':'')+'>ne</option></select></div></div>'+
    '<label>Parametry (jeden na řádek, formát: Název | příklad hodnot)</label><textarea id="tParams" rows="6">'+esc((t.params||[]).map(function(p){return p.label+' | '+(p.examples||'')}).join('\n'))+'</textarea>'+
    '<div class="err" id="tErr"></div>'+
    '<div class="actions" style="margin-top:14px"><button class="btn" onclick="saveTyp()">Uložit</button>'+(key&&t.key!=='abroll'?'<button class="btn warn" onclick="delTyp(\''+esc(key)+'\')">Smazat</button>':'')+'<button class="btn ghost" onclick="closeModal()">Zrušit</button></div></div>';
  m.classList.add('open');
}
function saveTyp(){
  function v(id){return (document.getElementById(id)||{}).value}
  var params=v('tParams').split('\n').map(function(l){var p=l.split('|');return {label:(p[0]||'').trim(),examples:(p[1]||'').trim()}}).filter(function(p){return p.label});
  var b={key:v('tKey'),name:v('tName'),normohodiny:v('tNh'),revizeNh:v('tRnh'),lhutaZkresleniDays:v('tZd'),lhutaRevizeDays:v('tRd'),lhutaPrideleniDays:v('tPd'),lhutaKontrolaDays:v('tKd'),lhutaObchodnikDays:v('tOd'),lhutaKlientDays:v('tCd'),linkValidDays:v('tLv'),internalCheck:v('tIc')==='1',params:params};
  if(!b.key||!b.name){document.getElementById('tErr').textContent='Vyplňte klíč i název.';return}
  api('/admin/typ','POST',b).then(function(o){if(!o.ok){document.getElementById('tErr').textContent=o.j.chyba;return}closeModal();reloadData()});
}
function delTyp(key){if(!confirm('Smazat typ výrobku?'))return;api('/admin/typ','POST',{key:key,delete:true}).then(function(){closeModal();reloadData()})}

document.addEventListener('click',function(e){var pop=document.getElementById('notifpop');if(pop.classList.contains('open')&&!pop.contains(e.target)&&!(e.target.closest('.iconbtn')))pop.classList.remove('open')});
reloadData();
</script>
</body>
</html>
