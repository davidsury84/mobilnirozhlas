<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smlouvy — ELKOPLAST</title>
<style>
  :root{--cerv:#c0392b;--zlut:#e67e22;--zel:#27ae60;--tm:#2c3e50;--sed:#7f8c8d;--lin:#e5e8eb;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f7f9;color:#1a1a1a}
  header{background:var(--tm);color:#fff;padding:12px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  header b{margin-right:16px;letter-spacing:.3px}
  header button{background:transparent;border:none;color:#cfd8e3;font:inherit;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:6px}
  header button.act,header button:hover{background:rgba(255,255,255,.14);color:#fff}
  main{max-width:1080px;margin:0 auto;padding:20px}
  h1{font-size:20px;margin:0 0 14px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .metr{font-size:30px;font-weight:800}
  .muted{color:var(--sed);font-size:13px}
  table{border-collapse:collapse;width:100%;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--lin);font-size:14px;vertical-align:top}
  th{background:#f0f2f5;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--sed)}
  tr[data-clic]{cursor:pointer} tr[data-clic]:hover td{background:#fafbfc}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;color:#fff}
  .cerv{background:var(--cerv)}.zlut{background:var(--zlut)}.zel{background:var(--zel)}.sed{background:var(--sed)}
  input,select,textarea{padding:7px 9px;border:1px solid #cfd6dd;border-radius:6px;font:inherit}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .btn{background:var(--zel);color:#fff;border:none;padding:9px 16px;border-radius:6px;font-weight:700;cursor:pointer}
  .btn.sec{background:#eef1f4;color:#2c3e50}
  a{color:#0e8a43}
  .warn{color:var(--cerv);font-weight:700}
  dialog{border:none;border-radius:10px;padding:0;max-width:560px;width:92%}
  dialog .hd{padding:14px 18px;border-bottom:1px solid var(--lin);font-weight:700}
  dialog .bd{padding:18px;display:grid;gap:10px}
  dialog .bd label{display:grid;gap:4px;font-size:13px;color:#555}
  dialog .ft{padding:12px 18px;border-top:1px solid var(--lin);text-align:right;display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<header>
  <b>ELKOPLAST · Smlouvy</b>
  <button data-tab="dash" class="act">Dashboard</button>
  <button data-tab="list">Seznam</button>
  <button data-tab="garanti">Garanti</button>
  <button data-tab="kal">Kalendář</button>
  <button id="navodBtn" style="margin-left:auto">❔ Návod</button>
  <span class="muted" id="whoami"></span>
</header>
<main id="app"><p class="muted">Načítám…</p></main>

<script>
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,a={},...c)=>{const e=document.createElement(t);for(const k in a){if(k==='html')e.innerHTML=a[k];else if(k==='on')for(const ev in a.on)e.addEventListener(ev,a.on[ev]);else e.setAttribute(k,a[k]);}c.flat().forEach(x=>e.append(x==null?'':x));return e;};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const czd = iso => { if(!iso) return '—'; const [y,m,d]=String(iso).slice(0,10).split('-'); return `${+d}.${+m}.${y}`; };
const money = (v,mena)=> v==null?null:Number(v).toLocaleString('cs-CZ')+' '+mena;
async function api(p,opt){const r=await fetch(p,opt);const t=await r.text();let j;try{j=JSON.parse(t)}catch{j=t} if(!r.ok)throw new Error((j&&j.chyba)||r.status);return j;}
function pill(dny){return dny<0?['cerv','PO TERMÍNU']:dny<30?['cerv','do 30']:dny<=90?['zlut','do 90']:['sed',dny+' dní'];}

let ADMIN=false;
let LIDE=[];
const app = $('#app');
document.querySelectorAll('header button[data-tab]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('header button[data-tab]').forEach(x=>x.classList.remove('act'));
  b.classList.add('act'); render(b.dataset.tab);
});
$('#navodBtn').onclick=()=>navod();

async function render(tab){
  app.innerHTML='<p class="muted">Načítám…</p>';
  try{ if(tab==='dash')await dash(); else if(tab==='list')await list(); else if(tab==='garanti')await garanti(); else if(tab==='kal')await kal(); }
  catch(e){ app.innerHTML='<p class="warn">Chyba: '+esc(e.message)+'</p>'; }
}

async function dash(){
  const d = await api('/api/smlouvy/dashboard');
  const z = d.zavazky || {rocni:{},podmineno:{},polozky:[],nevycisleno:[]};
  const sumStr = o => { const k=Object.keys(o); return k.length ? k.map(m=>o[m].toLocaleString('cs-CZ')+' '+m).join(' + ') : '—'; };
  app.innerHTML='';
  app.append(el('h1',{},'Dashboard — ',el('span',{class:'muted'},'stav k '+czd(d.dnes))));
  const cards = el('div',{class:'cards'});
  cards.append(
    el('div',{class:'card'}, el('div',{class:'muted'},'Červené (po termínu / do 30 dní)'), el('div',{class:'metr',style:'color:var(--cerv)'},String(d.cervene.length))),
    el('div',{class:'card'}, el('div',{class:'muted'},'Žluté (do 90 dní)'), el('div',{class:'metr',style:'color:var(--zlut)'},String(d.zlute.length))),
    el('div',{class:'card'}, el('div',{class:'muted'},'Roční závazky (opakované toky)'),
      el('div',{class:'metr',style:'font-size:20px;color:var(--tm)'},sumStr(z.rocni)),
      el('div',{class:'muted',style:'margin-top:10px'},'Jednorázové / podmíněné'),
      el('div',{style:'font-size:15px;font-weight:700;color:var(--sed)'},sumStr(z.podmineno)))
  );
  app.append(cards);
  // Nové soubory z Disku čekající na doplnění údajů správcem
  if((d.kDoplneni&&d.kDoplneni.length) || (ADMIN&&d.driveSync)){
    const dc = el('div',{class:'card',style:'margin-bottom:16px'});
    const hd = el('div',{style:'display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap'},
      el('h1',{style:'font-size:16px;margin:0'},'Nové z Disku — čeká na doplnění'),
      ADMIN&&d.driveSync ? el('button',{class:'ghost-btn',on:{click:async ev=>{ ev.target.disabled=true; ev.target.textContent='Kontroluji…';
        try{ const r=await api('/api/smlouvy/drive-sync',{method:'POST',body:'{}'});
          alert(r.chyba?('Chyba: '+r.chyba)
            : r.baseline?('První spuštění: '+(r.celkem??'?')+' stávajících souborů vzato jako archiv. Hlídají se soubory nahrané od teď.')
            : r.skipped?'Synchronizace není nakonfigurovaná (chybí klíč nebo složka).'
            : ('Nalezeno nových: '+(r.nove??0)+' (souborů ve složce: '+(r.celkem??'?')+')')); dash(); }
        catch(e){ alert('Chyba: '+e.message); ev.target.disabled=false; ev.target.textContent='↻ Zkontrolovat Disk teď'; } }}},'↻ Zkontrolovat Disk teď') : '');
    dc.append(hd);
    if(d.kDoplneni&&d.kDoplneni.length){
      dc.append(el('p',{class:'muted',style:'margin:6px 0 8px'},'U těchto souborů je potřeba doplnit klíčové údaje (protistrana, platnost, výpovědní lhůta, hodnota, garant). Uložením formuláře se smlouva zařadí do hlídání.'));
      const t = el('table',{},el('thead',{},el('tr',{},...['Soubor','Staženo','',''].map(h=>el('th',{},h)))));
      const tb = el('tbody');
      d.kDoplneni.forEach(x=>tb.append(el('tr',{},
        el('td',{},el('strong',{},esc(x.cislo_smlouvy))),
        el('td',{class:'muted'},(x.created_at||'').slice(0,10)),
        el('td',{}, x.drive_url?el('a',{href:x.drive_url,target:'_blank'},'Otevřít PDF'):''),
        el('td',{}, el('button',{class:'primary-btn',style:'padding:6px 12px',on:{click:()=>doplnUdaje(x.id).catch(e=>alert('Chyba: '+e.message))}},'Doplnit údaje')))));
      t.append(tb); dc.append(t);
    } else {
      dc.append(el('p',{class:'muted',style:'margin:6px 0 0'},'Žádné soubory nečekají na doplnění.'));
    }
    app.append(dc);
  }
  const wp = await wikiPanel(); if(wp) app.append(wp);
  if(d.eskalovane||d.bounced){
    app.append(el('div',{class:'card',style:'margin-bottom:16px'},
      el('h1',{style:'font-size:16px'},'Vyžaduje pozornost'),
      d.eskalovane?el('p',{},el('span',{class:'pill cerv'},'Eskalováno'),' '+d.eskalovane+' termínů (D−14 bez potvrzení).'):'',
      d.bounced?el('p',{},el('span',{class:'pill cerv'},'Nedoručeno'),' '+d.bounced+' notifikací (bounce).'):''));
  }
  // Auditovatelný rozpad závazků — které smlouvy do součtů vstupují
  const rz=el('div',{class:'card'});
  rz.append(el('h1',{style:'font-size:16px'},'Rozpad finančních závazků'),
    el('p',{class:'muted',style:'margin-top:-6px'},'Podmíněná expozice (ručení) a majetek se NEsčítají s ročními toky — jsou to nesourodé veličiny.'));
  const TYP={mesicni:'měsíční (×12)',rocni:'roční',jednorazova:'jednorázová',expozice:'ručení / expozice',majetek:'majetek'};
  const rt=el('table',{},el('thead',{},el('tr',{},...['Smlouva','Částka','Typ','Skupina'].map(h=>el('th',{},h)))));
  const rtb=el('tbody');
  z.polozky.forEach(p=>rtb.append(el('tr',{'data-clic':1,on:{click:()=>seznamHledat(p.cislo_smlouvy)}},
    el('td',{html:`<strong>${esc(p.cislo_smlouvy)}</strong> · ${esc(p.protistrana_nazev||'')}`}),
    el('td',{},p.castka.toLocaleString('cs-CZ')+' '+p.mena),
    el('td',{},TYP[p.hodnota_typ]||p.hodnota_typ),
    el('td',{},el('span',{class:'pill '+(p.skupina==='rocni'?'zel':'sed')},p.skupina==='rocni'?'roční tok':'podmíněné / jednoráz.')))));
  z.nevycisleno.forEach(n=>rtb.append(el('tr',{style:'opacity:.65'},
    el('td',{html:`<strong>${esc(n.cislo_smlouvy)}</strong> · ${esc(n.protistrana_nazev||'')}`}),
    el('td',{},'—'),el('td',{class:'muted'},esc(n.hodnota_popis||'bez čísla')),
    el('td',{},el('span',{class:'pill sed'},'nevyčísleno')))));
  if(!z.polozky.length&&!z.nevycisleno.length)rtb.append(el('tr',{},el('td',{colspan:4,class:'muted'},'Žádné aktivní závazky.')));
  rt.append(rtb);rz.append(rt);
  app.append(rz);

  app.append(tabulkaTerminu([...d.cervene,...d.zlute],true));
}
// Panel „Termíny z wiki" — čte sdílený registr lhůt z LLM-wiki (WIKI_TERMINY_URL).
async function wikiPanel(){
  let d; try{ d = await api('/api/smlouvy/wiki-terminy'); }catch(e){ return null; }
  if(!d.configured) return null; // funkce vypnutá (WIKI_TERMINY_URL není nastaveno)
  const card = el('div',{class:'card',style:'margin-bottom:16px'});
  card.append(el('h1',{style:'font-size:16px'},'Termíny z wiki ',
    el('span',{class:'muted',style:'font-size:12px;font-weight:400'},'(BOZP/PO + smlouvy — sdílený registr)')));
  if(d.chyba){ card.append(el('p',{class:'muted',style:'margin-top:-6px'},'Registr zatím nelze načíst ('+esc(d.chyba)+'). Zkontroluj WIKI_TERMINY_URL a WIKI_TERMINY_TOKEN.')); return card; }
  const items = d.items||[];
  if(!items.length){ card.append(el('p',{class:'muted',style:'margin-top:-6px'},'Žádné aktivní lhůty v registru.')); return card; }
  const t = el('table',{},el('thead',{},el('tr',{},...['Termín','Za','Doména','Subjekt','Popis','Odpovědný'].map(h=>el('th',{},h)))));
  const tb = el('tbody');
  items.forEach(x=>{ const cls = pill(x.dny)[0];
    tb.append(el('tr',{},
      el('td',{},czd(x.termin)),
      el('td',{},el('span',{class:'pill '+cls}, x.dny<0 ? ('po '+(-x.dny)+' d') : (x.dny+' d'))),
      el('td',{},el('span',{class:'pill sed'}, esc(x.domena||''))),
      el('td',{},esc(x.subjekt||'')),
      el('td',{},esc(x.popis||'')),
      el('td',{class:'muted'},esc(x.odpovedny||'—'))));
  });
  t.append(tb); card.append(t);
  card.append(el('p',{class:'muted',style:'font-size:11px;margin-top:8px'},'Zdroj: '+esc(d.source||'')));
  return card;
}
// otevře Seznam s předvyplněným filtrem (z rozpadu na dashboardu)
function seznamHledat(q){ $('header button[data-tab=list]').click(); setTimeout(()=>{ const i=document.querySelector('main input'); if(i){i.value=q; i.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter'}));} },50); }

function tabulkaTerminu(rows,klik){
  const t=el('table',{},el('thead',{},el('tr',{},...['Pásmo','Smlouva','Typ','Datum','Za dní','Stav'].map(h=>el('th',{},h)))));
  const tb=el('tbody');
  if(!rows.length)tb.append(el('tr',{},el('td',{colspan:6,class:'muted'},'Žádné termíny v pásmu 90 dní.')));
  rows.forEach(r=>{const [c,lbl]=pill(r.dny);
    const tr=el('tr',klik?{'data-clic':1,on:{click:()=>detail(r.smlouva_id)}}:{},
      el('td',{},el('span',{class:'pill '+c},lbl)),
      el('td',{html:`<strong>${esc(r.cislo_smlouvy||'')}</strong> · ${esc(r.protistrana_nazev||'')}`}),
      el('td',{},r.typ),el('td',{},czd(r.datum)),el('td',{},String(r.dny)),
      el('td',{html:(esc(r.stav))+(r.garant_email?'':' · <span class="warn">garant nedořešen</span>')}));
    tb.append(tr);});
  t.append(tb);return t;
}

async function list(){
  app.innerHTML='';
  const q=el('input',{placeholder:'protistrana / předmět',style:'flex:1;min-width:180px'});
  const fk=el('select',{},el('option',{value:''},'— kategorie —'),...['odberatelska','dodavatelska','zavazek','plneni'].map(k=>el('option',{value:k},k)));
  const fs=el('select',{},el('option',{value:''},'— stav —'),...['aktivni','vypovezena','ukoncena','archivovana'].map(k=>el('option',{value:k},k)));
  const go=el('button',{class:'btn'},'Filtrovat');
  const bar=el('div',{class:'row'},fk,fs,q,go);
  if(ADMIN)bar.append(el('button',{class:'btn sec',on:{click:()=>novaSmlouva()}},'+ Nová smlouva'),el('button',{class:'btn sec',on:{click:()=>importPanel()}},'Import registru'));
  app.append(el('h1',{},'Seznam smluv'),bar);
  const wrap=el('div',{});app.append(wrap);
  async function nacti(){
    const p=new URLSearchParams();if(fk.value)p.set('kategorie',fk.value);if(fs.value)p.set('stav',fs.value);if(q.value)p.set('q',q.value);
    const data=await api('/api/smlouvy/list?'+p);
    const t=el('table',{},el('thead',{},el('tr',{},...['Číslo','Kategorie','Protistrana','Platnost','Hodnota','Garant','Stav'].map(h=>el('th',{},h)))));
    const tb=el('tbody');
    if(!data.length)tb.append(el('tr',{},el('td',{colspan:7,class:'muted'},'Nic nenalezeno.')));
    data.forEach(s=>tb.append(el('tr',{'data-clic':1,on:{click:()=>detail(s.id)}},
      el('td',{html:`<strong>${esc(s.cislo_smlouvy||'')}</strong>${s.je_placeholder?' 📦':''}`}),
      el('td',{},`${s.kategorie||''}${s.podtyp?' · '+s.podtyp:''}${s.smer?' ('+s.smer+')':''}`),
      el('td',{},s.protistrana_nazev),
      el('td',{},s.platnost_do?czd(s.platnost_do):(s.platnost_podminka||s.platnost_typ)),
      el('td',{},money(s.hodnota,s.mena)||s.hodnota_popis||'—'),
      garantCell(s),
      el('td',{},el('span',{class:'pill '+(s.stav==='aktivni'?'zel':'sed')},s.stav_popis||s.stav)))));
    t.append(tb);wrap.innerHTML='';wrap.append(t);
  }
  if(!LIDE.length){try{LIDE=await api('/api/smlouvy/lide');}catch(e){}}
  if(!$('#lide-dl'))document.body.append(el('datalist',{id:'lide-dl'},...LIDE.map(l=>el('option',{value:l.email},l.name||''))));
  go.onclick=nacti;q.addEventListener('keydown',e=>{if(e.key==='Enter')nacti();});await nacti();
}
// Buňka garanta — pro správce/admina inline editovatelná (Enter/blur uloží), jinak text.
function garantCell(s){
  const td=el('td');
  td.addEventListener('click',e=>e.stopPropagation()); // klik do buňky neotevře detail smlouvy
  if(!ADMIN){ td.innerHTML=s.garant_email?esc(s.garant_email):'<span class="warn">nedořešen</span>'; return td; }
  const inp=el('input',{type:'email',value:s.garant_email||'',placeholder:'garant@elkoplast.cz',list:'lide-dl',
    style:'width:200px;padding:4px 6px'+(s.garant_email?'':';border-color:var(--cerv)')});
  const stav=el('span',{style:'margin-left:6px;font-size:12px;white-space:nowrap'});
  async function uloz(){
    const v=inp.value.trim();
    if(v===(s.garant_email||''))return;
    stav.textContent='ukládám…';stav.style.color='#888';
    try{ await api('/api/smlouvy/update?id='+s.id,{method:'POST',body:JSON.stringify({garant_email:v||null})});
      s.garant_email=v; inp.style.borderColor=v?'#cfd6dd':'var(--cerv)';
      stav.textContent='✓ uloženo';stav.style.color='var(--zel)';setTimeout(()=>{stav.textContent='';},1600);
    }catch(e){ stav.textContent='✗ '+e.message;stav.style.color='var(--cerv)'; }
  }
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  inp.addEventListener('blur',uloz);
  td.append(inp,stav);
  return td;
}

// Pohled podle garanta — garanti a pod každým smlouvy, ve kterých figuruje.
async function garanti(){
  app.innerHTML='';
  app.append(el('h1',{},'Pohled podle garanta'));
  const data=await api('/api/smlouvy/list');
  if(!LIDE.length){try{LIDE=await api('/api/smlouvy/lide');}catch(e){}}
  const jmeno=e=>{const p=LIDE.find(l=>l.email&&e&&l.email.toLowerCase()===e.toLowerCase());return p&&p.name?p.name:null;};
  const grp=new Map();
  data.forEach(s=>{const key=(s.garant_email||'').trim().toLowerCase()||'__none__';
    if(!grp.has(key))grp.set(key,{email:s.garant_email||'',smlouvy:[]});
    grp.get(key).smlouvy.push(s);});
  const groups=[...grp.values()].filter(g=>g.email).sort((a,b)=>b.smlouvy.length-a.smlouvy.length||String(jmeno(a.email)||a.email).localeCompare(String(jmeno(b.email)||b.email)));
  const bez=grp.get('__none__');
  const q=el('input',{placeholder:'hledat garanta — jméno nebo e-mail…',style:'flex:1;min-width:220px'});
  app.append(el('div',{class:'row'},q));
  const sum=el('p',{class:'muted',style:'margin-top:2px'});
  const wrap=el('div',{});
  app.append(sum,wrap);
  const karta=(g,warn)=>{
    const card=el('div',{class:'card'});
    card.append(el('div',{style:'display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap'},
      el('h1',{style:'font-size:16px;margin:0'+(warn?';color:var(--cerv)':'')},warn?'— bez garanta —':(jmeno(g.email)||g.email)),
      el('span',{class:'pill '+(warn?'cerv':'zel')},g.smlouvy.length+'×')));
    if(!warn && jmeno(g.email))card.append(el('div',{class:'muted',style:'font-size:12px;margin-top:2px'},g.email));
    const t=el('table',{style:'margin-top:8px'},el('thead',{},el('tr',{},...['Číslo','Protistrana','Platnost','Stav'].map(h=>el('th',{},h)))));
    const tb=el('tbody');
    g.smlouvy.slice().sort((a,b)=>String(a.cislo_smlouvy).localeCompare(String(b.cislo_smlouvy)))
      .forEach(s=>tb.append(el('tr',{'data-clic':1,on:{click:()=>detail(s.id)}},
        el('td',{html:`<strong>${esc(s.cislo_smlouvy||'')}</strong>${s.je_placeholder?' 📦':''}`}),
        el('td',{},s.protistrana_nazev),
        el('td',{},s.platnost_do?czd(s.platnost_do):(s.platnost_podminka||s.platnost_typ)),
        el('td',{},el('span',{class:'pill '+(s.stav==='aktivni'?'zel':'sed')},s.stav_popis||s.stav)))));
    t.append(tb);card.append(t);return card;
  };
  const pluralG=n=>n+' '+(n===1?'garant':(n<5?'garanti':'garantů'));
  function vykresli(){
    const f=q.value.trim().toLowerCase();
    const gf=groups.filter(g=>!f||(jmeno(g.email)||'').toLowerCase().includes(f)||String(g.email).toLowerCase().includes(f));
    const showBez=!!bez&&(!f||'bez garanta'.includes(f)||'nepřiřazeno'.includes(f));
    wrap.innerHTML='';
    sum.textContent=f
      ? (pluralG(gf.length)+' odpovídá „'+q.value.trim()+'"'+(showBez?' + bez garanta':''))
      : (pluralG(groups.length)+' · '+data.length+' smluv'+(bez?' · '+bez.smlouvy.length+' bez garanta':''));
    if(!gf.length&&!showBez){wrap.append(el('div',{class:'card muted'},'Žádný garant neodpovídá hledání.'));return;}
    gf.forEach(g=>wrap.append(karta(g,false)));
    if(showBez)wrap.append(karta(bez,true));
  }
  if(!groups.length&&!bez){sum.remove();wrap.append(el('div',{class:'card muted'},'Žádné smlouvy.'));return;}
  q.addEventListener('input',vykresli);
  vykresli();
}

  const err=el('p',{class:'warn'});bd.append(err);
  dlg.append(el('div',{class:'hd'},title),bd,el('div',{class:'ft'},
    el('button',{class:'btn sec',on:{click:()=>dlg.close()}},'Zrušit'),

    <p><b>Co udělá Simona:</b> u položky klikne <b>„Doplnit údaje"</b> → otevře se formulář (vedle je odkaz <i>Otevřít PDF</i>). Doplní: protistranu + IČO, předmět, platnost, výpovědní lhůtu, prolongaci, hodnotu, <b>garanta (e-mail)</b>. <b>Uložením se smlouva zařadí do hlídání</b> a z fronty zmizí.</p>
    <p><b>Potom:</b> v detailu smlouvy založí 2–4 <b>hlídané termíny</b> (konec platnosti, deadline výpovědi…). Od té chvíle chodí upozornění D−90/60/30 garantovi.</p>
    <p class="muted"><b>Pozn.:</b> smlouvy, které ve složce byly už před spuštěním téhle funkce, se berou jako archiv a návrhy se z nich nezakládají. Duplicitně se nic nezaloží — každý soubor se pozná podle svého ID.</p>`},
  wiki:{t:'📚 Termíny z wiki',h:`
    <p><b>Co to je:</b> vedle ručně zadaných smluv umí hlídač číst lhůty z <b>LLM-wiki</b> — samostatného repozitáře, kde si AI z nahraných PDF (smlouvy, BOZP/PO) udržuje strukturovanou wiki a z ní generuje strojově čitelný registr lhůt <code>terminy.md</code>.</p>
    <p><b>Jeden zdroj pravdy:</b> místo dvou databází sdílí wiki a hlídač jeden soubor. Na dashboardu je panel <b>„Termíny z wiki"</b> (červené do 30 dní, žluté do 90 dní) a hlídač jednou denně posílá <b>digest e-mail</b> lhůt do 30 dnů.</p>
    <p><b>Jak přibude termín do wiki:</b></p>
    <ol>
      <li>Nové PDF hodíš do složky <code>inbox/</code> ve wiki repozitáři.</li>
      <li>V Claude Code spustíš <code>/ingest</code> — AI dokument zkompiluje do wiki stránky s citacemi na zdroj a doplní řádek do <code>terminy.md</code>.</li>
      <li>Hlídač registr přečte a lhůtu ukáže v panelu (hlídá ji stejně jako smluvní termíny).</li>
    </ol>
    <p class="muted">Nastavení (admin): proměnné <code>WIKI_TERMINY_URL</code> a <code>WIKI_TERMINY_TOKEN</code> na Railway (production). Bez nich se panel nezobrazuje.</p>`},
  spravce:{t:'👤 Správce (Simona)',h:`
    <p>Zakládá a edituje <b>všechny</b> smlouvy, dodatky a termíny.</p>
    <p><b>Běžný postup u nové smlouvy (od 7/2026):</b> smlouvu stačí <b>nahrát do složky na Disku</b> — systém ji sám najde, založí návrh a pošle vám e-mail. Vy pak na dashboardu v kartě <b>„Nové z Disku — čeká na doplnění"</b> kliknete <b>„Doplnit údaje"</b> a vyplníte formulář (PDF máte na kliknutí vedle). Podrobně v záložce <b>„📥 Nové z Disku"</b>.</p>
    <p><b>Co vyplnit:</b> číslo, kategorie a směr (příjem/výdaj), protistrana + IČO, předmět, platnost do (nebo podmínka, např. „710 000 km"), výpovědní lhůta, prolongace, hodnota + typ + měna, <b>garant (e-mail)</b>.</p>
    <p><b>Proč garant e-mail:</b> bez něj nemají termíny komu posílat upozornění — smlouva na dashboardu svítí „garant nedořešen".</p>
    <p><b>Termíny:</b> po doplnění údajů založte v detailu smlouvy hlídané termíny (2–4). Odvozený „deadline výpovědi" se dopočítá z platnosti a výpovědní lhůty. Opakující (indexace, audit) se po vyřešení samy založí na další období.</p>
    <p><b>Ruční založení a import</b> zůstávají: „+ Nová smlouva" v Seznamu, případně „Import registru" (KS balíky jako placeholder, termíny z volného textu jen navrhne ke kontrole).</p>`},
  garant:{t:'🎯 Garant',h:`
    <p>Garant = odpovědná osoba za konkrétní smlouvu (pole „garant" na smlouvě).</p>
    <p><b>Co děláš:</b></p>
    <ul>
      <li>Dostáváš e-maily <b>D−90/60/30</b> na termíny svých smluv.</li>
      <li>Až je termín vyřešený, klikni v e-mailu na <b>„Vyřešeno"</b>. <b>Proč:</b> zavře termín, zapíše kdo/kdy; jinak jde v D−14 eskalace na admina a smlouva zčervená.</li>
      <li>Do panelu <b>„Řešení plnění"</b> na detailu své smlouvy piš průběžné záznamy — co se stalo / jak se to řeší.</li>
    </ul>`},
  admin:{t:'🛡️ Admin (David)',h:`
    <p>Vidí a edituje vše jako správce, navíc:</p>
    <ul>
      <li>Dostává <b>eskalace D−14</b> a upozornění na <b>nedoručené e-maily</b> (bounce).</li>
      <li>Ve správě zaměstnanců přiřazuje uživatelům modul <b>„smlouvy"</b> (jinak ho v menu nevidí).</li>
      <li>Doplňuje garanty tam, kde je v registru jen oddělení (logistika, marketing…) → konkrétní e-mail.</li>
    </ul>`},
  ctenar:{t:'👁️ Čtenář',h:`
    <p>Vidí všechny smlouvy, termíny a kalendář. <b>Needituje</b> a <b>nepotvrzuje</b> — jen náhled a přehled.</p>`},
};
function navod(){
  const dlg=el('dialog',{style:'max-width:700px'});
  const nav=el('div',{style:'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px'});
  const content=el('div',{style:'line-height:1.5;font-size:14px'});
  function show(k){
    content.innerHTML=NAVOD[k].h;
    nav.querySelectorAll('button').forEach(b=>b.style.outline=(b.dataset.k===k?'2px solid var(--zel)':'none'));
  }
  Object.entries(NAVOD).forEach(([k,v])=>nav.append(el('button',{class:'btn sec','data-k':k,style:'padding:6px 12px',on:{click:()=>show(k)}},v.t)));
  dlg.append(el('div',{class:'hd'},'Návod — co má kdo vyplnit a proč'),
    el('div',{class:'bd'},nav,content),
    el('div',{class:'ft'},el('button',{class:'btn',on:{click:()=>dlg.close()}},'Rozumím')));
  document.body.append(dlg);dlg.showModal();
  dlg.addEventListener('close',()=>{dlg.remove();try{localStorage.setItem('smlouvy_navod_seen','1')}catch(e){}});
  show(ADMIN?'admin':'jak');
}

// bootstrap
(async()=>{
  try{const me=await api('/api/smlouvy/me');ADMIN=!!me.admin;$('#whoami').textContent=(me.email||'')+(me.admin?' · správce':' · čtenář');}
  catch(e){$('#whoami').textContent='';}
  render('dash');
  try{ if(!localStorage.getItem('smlouvy_navod_seen')) setTimeout(navod,400); }catch(e){}
})();
</script>
</body>
</html>
