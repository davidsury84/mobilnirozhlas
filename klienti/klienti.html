<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klientské stránky</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#f2f5f1;color:#0f1512;font-size:14px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;background:#fff;border-bottom:1px solid #e3e7e0;position:sticky;top:0;z-index:10}
.top h1{font-size:17px;margin:0;display:flex;align-items:center;gap:9px}
.top h1 b{display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:linear-gradient(150deg,#ffd21a,#ffc400);color:#11271c;font-size:15px}
.wrap{display:grid;grid-template-columns:290px 1fr;gap:18px;padding:18px 20px;max-width:1280px;margin:0 auto}
@media(max-width:860px){.wrap{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e3e7e0;border-radius:14px;padding:16px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;border-radius:9px;padding:9px 15px;font:600 13.5px system-ui;background:linear-gradient(135deg,#15ab57,#0a6b34);color:#fff;text-decoration:none}
.btn.sek{background:#fff;color:#1c1d1a;border:1px solid #cdd3ca}
.btn.red{background:#fff;color:#c23636;border:1px solid #e6c9c9}
.btn:disabled{opacity:.55;cursor:default}
.seznam .pol{display:block;width:100%;text-align:left;border:1px solid #e3e7e0;background:#fff;border-radius:11px;padding:11px 13px;margin-bottom:8px;cursor:pointer;font:inherit}
.seznam .pol.on{border-color:#0a6b34;background:#f2f9f4}
.seznam .pol b{display:block;font-size:14px}
.seznam .pol small{color:#79827a;font-size:12px}
.chip{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:600}
.chip.pub{background:#e0f4e8;color:#0a6b34}.chip.kon{background:#f4efdc;color:#7a5c0e}
label.f{display:block;font-size:12.5px;font-weight:600;color:#4c564e;margin:12px 0 4px}
input[type=text],textarea,select{width:100%;padding:9px 11px;border:1px solid #cdd3ca;border-radius:9px;font:14px system-ui;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:#0a6b34}
.radek{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.radek3{display:grid;grid-template-columns:2fr 3fr auto;gap:8px;margin-bottom:8px;align-items:start}
.radek2{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px;align-items:start}
.mini{background:#fff;border:1px solid #dbe2db;color:#c23636;border-radius:8px;width:34px;height:36px;cursor:pointer;font-size:16px}
.pridat{background:none;border:1px dashed #b7c2b8;color:#0a6b34;border-radius:9px;padding:8px 13px;cursor:pointer;font:600 13px system-ui;margin-top:2px}
h2{font-size:15px;margin:22px 0 4px;padding-top:14px;border-top:1px solid #eef1ec}
h2:first-of-type{margin-top:6px;border:none;padding-top:0}
.pomoc{color:#79827a;font-size:12.5px;margin:2px 0 0}
.listky{display:flex;gap:8px;margin-bottom:14px}
.listky button{border:1px solid #cdd3ca;background:#fff;border-radius:999px;padding:7px 16px;font:600 13px system-ui;cursor:pointer}
.listky button.on{background:#0a6b34;border-color:#0a6b34;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;color:#79827a;padding:7px 8px;border-bottom:2px solid #e3e7e0}
td{padding:9px 8px;border-bottom:1px solid #eef1ec;vertical-align:top}
.prepinac{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:13.5px}
.prepinac input{width:auto}
.ulozeno{color:#0a6b34;font-weight:600;font-size:13px;min-width:80px}
.url{display:flex;gap:8px;align-items:center;background:#f2f7f3;border:1px solid #dbe7dd;border-radius:9px;padding:8px 11px;margin-top:8px;font-size:13px}
.url code{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#0a6b34}
.prazdno{text-align:center;color:#79827a;padding:40px 10px}
</style>
</head>
<body>
<div class="top">
  <h1><b>✓</b>Klientské stránky <span class="pomoc" style="font-weight:400">· interaktivní stránky pro potenciální klienty</span></h1>
  <button class="btn" onclick="nova()">+ Nová stránka</button>
</div>

<div class="wrap">
  <div>
    <div class="listky">
      <button id="tabStranky" class="on" onclick="prepni('stranky')">Stránky</button>
      <button id="tabLeady" onclick="prepni('leady')">Poptávky <span id="leadPocet"></span></button>
    </div>
    <div class="seznam" id="seznam"></div>
  </div>
  <div id="obsah"></div>
</div>

<script>
var D = { pages:[], leads:[], base:'', me:'', admin:false, mailReady:false, vybrane:null, tab:'stranky' };
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function datum(ts){return ts?new Date(ts).toLocaleString('cs-CZ',{day:'numeric',month:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}

async function nacti(){
  var r = await fetch('/api/klienti/pages',{cache:'no-store'});
  if(!r.ok){document.getElementById('obsah').innerHTML='<div class="card prazdno">Nepodařilo se načíst data ('+r.status+').</div>';return}
  var j = await r.json();
  D.pages=j.pages||[]; D.base=j.base||''; D.me=j.me||''; D.admin=!!j.admin; D.mailReady=!!j.mailReady;
  var rl = await fetch('/api/klienti/leads',{cache:'no-store'});
  if(rl.ok){D.leads=(await rl.json()).leads||[]}
  document.getElementById('leadPocet').textContent = D.leads.length?('('+D.leads.length+')'):'';
  kresli();
}

function prepni(t){D.tab=t;
  document.getElementById('tabStranky').className=t==='stranky'?'on':'';
  document.getElementById('tabLeady').className=t==='leady'?'on':'';
  kresli();
}

function kresli(){
  var sez=document.getElementById('seznam');
  if(D.tab==='leady'){sez.innerHTML='';kresliLeady();return}
  sez.innerHTML = D.pages.length ? D.pages.map(function(p){
    return '<button class="pol'+(D.vybrane===p.id?' on':'')+'" onclick="vyber(\''+p.id+'\')"><b>'+esc(p.nazev)+'</b>'+
      '<small>'+(p.publikovano?'<span class="chip pub">publikováno</span>':'<span class="chip kon">koncept</span>')+
      ' · 👁 '+(p.views||0)+' · 📥 '+(p.leadCount||0)+'</small></button>';
  }).join('') : '<p class="pomoc" style="padding:6px 2px">Zatím žádná stránka. Vytvořte první tlačítkem nahoře.</p>';
  if(D.vybrane){var p=D.pages.find(function(x){return x.id===D.vybrane});if(p){kresliEditor(p);return}}
  document.getElementById('obsah').innerHTML='<div class="card prazdno"><p style="font-size:38px;margin:0 0 10px">📄</p>'+
    '<b>Vyberte stránku vlevo, nebo vytvořte novou.</b><p class="pomoc" style="max-width:430px;margin:8px auto 0">Každá stránka dostane veřejný odkaz, který pošlete potenciálnímu klientovi. Klient projde interaktivním průvodcem a nechá vám na sebe kontakt — poptávka se objeví v záložce Poptávky'+(D.mailReady?' a přijde vám e-mailem':'')+'.</p></div>';
}

function vyber(id){D.vybrane=id;prepni('stranky')}

function nova(){
  D.vybrane=null; D.tab='stranky';
  kresliEditor({ nazev:'', slug:'', publikovano:false, klientFirma:'', barva:'#0a6b34',
    hero:{titulek:'',podtitulek:'',cta:'Nezávazná poptávka'}, oNas:'',
    vyhody:[{titulek:'',text:''},{titulek:'',text:''},{titulek:'',text:''}],
    produkty:[{nazev:'',popis:'',cena:''}], faq:[{q:'',a:''}],
    kontakt:{jmeno:'',email:D.me,telefon:''} });
}

/* ---------- editor ---------- */
function radekVyhoda(v){return '<div class="radek3"><input type="text" class="vy-t" placeholder="Titulek" value="'+esc(v.titulek)+'"><input type="text" class="vy-x" placeholder="Krátký popis" value="'+esc(v.text)+'"><button class="mini" onclick="this.parentNode.remove()">×</button></div>'}
function radekProdukt(v){return '<div class="radek3"><input type="text" class="pr-n" placeholder="Název produktu / služby" value="'+esc(v.nazev)+'"><input type="text" class="pr-p" placeholder="Popis (co klientovi přinese)" value="'+esc(v.popis)+'"><button class="mini" onclick="this.parentNode.remove()">×</button></div>'}
function radekFaq(v){return '<div class="radek2"><div><input type="text" class="fq-q" placeholder="Otázka" value="'+esc(v.q)+'" style="margin-bottom:6px"><input type="text" class="fq-a" placeholder="Odpověď" value="'+esc(v.a)+'"></div><button class="mini" onclick="this.parentNode.remove()">×</button></div>'}

function kresliEditor(p){
  var url = D.base+'/k/'+(p.slug||'…');
  document.getElementById('obsah').innerHTML =
  '<div class="card">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">'+
    '<label class="prepinac"><input type="checkbox" id="e-pub"'+(p.publikovano?' checked':'')+'> Publikováno (viditelné pro klienta)</label>'+
    '<div style="display:flex;gap:8px;align-items:center"><span class="ulozeno" id="stav"></span>'+
    (p.id?'<a class="btn sek" href="/k/'+esc(p.slug)+'?nahled=1" target="_blank">👁 Klientský náhled</a>':'')+
    (p.id?'<button class="btn red" onclick="smazat(\''+p.id+'\')">Smazat</button>':'')+
    '<button class="btn" onclick="uloz(\''+(p.id||'')+'\')">Uložit'+(p.id?'':' a vytvořit')+'</button></div></div>'+
  (p.id?'<div class="url"><code id="verejnaUrl">'+esc(url)+'</code><button class="btn sek" style="padding:6px 11px" onclick="kopiruj()">Kopírovat odkaz</button></div>':'')+

  '<h2>Základ</h2><div class="radek">'+
  '<div><label class="f">Interní název (klient nevidí)</label><input type="text" id="e-nazev" value="'+esc(p.nazev)+'" placeholder="Např. Nabídka — Obec Slušovice"></div>'+
  '<div><label class="f">Adresa stránky (slug)</label><input type="text" id="e-slug" value="'+esc(p.slug)+'" placeholder="obec-slusovice"><p class="pomoc">'+esc(D.base)+'/k/<b>slug</b></p></div></div>'+
  '<div class="radek">'+
  '<div><label class="f">Personalizace — jméno firmy klienta (nepovinné)</label><input type="text" id="e-firma" value="'+esc(p.klientFirma)+'" placeholder="Obec Slušovice"><p class="pomoc">Zobrazí se v záhlaví: „Připraveno pro …"</p></div>'+
  '<div><label class="f">Barva stránky</label><input type="color" id="e-barva" value="'+esc(p.barva||'#0a6b34')+'" style="width:64px;height:38px;padding:2px;border:1px solid #cdd3ca;border-radius:9px"></div></div>'+

  '<h2>Úvod (hero)</h2>'+
  '<label class="f">Hlavní titulek</label><input type="text" id="e-titulek" value="'+esc(p.hero.titulek)+'" placeholder="Chytré odpadové hospodářství pro vaši obec">'+
  '<label class="f">Podtitulek</label><textarea id="e-podtitulek" rows="2" placeholder="Jedna dvě věty, proč to klienta zajímá.">'+esc(p.hero.podtitulek)+'</textarea>'+
  '<label class="f">Text tlačítka (výzva k akci)</label><input type="text" id="e-cta" value="'+esc(p.hero.cta)+'">'+

  '<h2>Kdo jsme (nepovinné)</h2><textarea id="e-onas" rows="3" placeholder="Krátké představení firmy.">'+esc(p.oNas)+'</textarea>'+

  '<h2>Proč s námi — výhody</h2><div id="vyhody">'+(p.vyhody||[]).map(radekVyhoda).join('')+'</div>'+
  '<button class="pridat" onclick="pridej(\'vyhody\',radekVyhoda)">+ přidat výhodu</button>'+

  '<h2>Produkty / služby</h2><p class="pomoc" style="margin-bottom:8px">Zobrazí se jako karty a zároveň jako volby v interaktivním průvodci poptávkou.</p>'+
  '<div id="produkty">'+(p.produkty||[]).map(radekProdukt).join('')+'</div>'+
  '<button class="pridat" onclick="pridej(\'produkty\',radekProdukt)">+ přidat produkt</button>'+

  '<h2>Časté otázky (FAQ)</h2><div id="faq">'+(p.faq||[]).map(radekFaq).join('')+'</div>'+
  '<button class="pridat" onclick="pridej(\'faq\',radekFaq)">+ přidat otázku</button>'+

  '<h2>Kontaktní osoba</h2><p class="pomoc" style="margin-bottom:2px">Zobrazí se v patičce stránky; na e-mail chodí notifikace o nových poptávkách'+(D.mailReady?'':' (pošta zatím není nastavená — notifikace se neodešlou)')+'.</p>'+
  '<div class="radek"><div><label class="f">Jméno</label><input type="text" id="e-kjmeno" value="'+esc(p.kontakt.jmeno)+'"></div>'+
  '<div><label class="f">E-mail</label><input type="text" id="e-kemail" value="'+esc(p.kontakt.email)+'"></div></div>'+
  '<label class="f">Telefon</label><input type="text" id="e-ktel" value="'+esc(p.kontakt.telefon)+'" style="max-width:280px">'+
  '</div>';
}
function pridej(id,fn){var d=document.createElement('div');d.innerHTML=fn({titulek:'',text:'',nazev:'',popis:'',cena:'',q:'',a:''});document.getElementById(id).appendChild(d.firstChild)}
function sber(sel,map){return [].slice.call(document.querySelectorAll(sel)).map(map)}

async function uloz(id){
  var b = {
    id: id||undefined,
    nazev: document.getElementById('e-nazev').value.trim(),
    slug: document.getElementById('e-slug').value.trim(),
    publikovano: document.getElementById('e-pub').checked,
    klientFirma: document.getElementById('e-firma').value.trim(),
    barva: document.getElementById('e-barva').value,
    hero: { titulek: document.getElementById('e-titulek').value.trim(),
      podtitulek: document.getElementById('e-podtitulek').value.trim(),
      cta: document.getElementById('e-cta').value.trim() },
    oNas: document.getElementById('e-onas').value.trim(),
    vyhody: sber('#vyhody .radek3',function(r){return{titulek:r.querySelector('.vy-t').value.trim(),text:r.querySelector('.vy-x').value.trim()}}),
    produkty: sber('#produkty .radek3',function(r){return{nazev:r.querySelector('.pr-n').value.trim(),popis:r.querySelector('.pr-p').value.trim()}}),
    faq: sber('#faq .radek2',function(r){return{q:r.querySelector('.fq-q').value.trim(),a:r.querySelector('.fq-a').value.trim()}}),
    kontakt: { jmeno: document.getElementById('e-kjmeno').value.trim(),
      email: document.getElementById('e-kemail').value.trim(),
      telefon: document.getElementById('e-ktel').value.trim() }
  };
  if(!b.nazev){alert('Vyplňte interní název stránky.');return}
  var st=document.getElementById('stav'); st.textContent='Ukládám…';
  var r = await fetch('/api/klienti/pages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  var j = await r.json();
  if(!r.ok){st.textContent='';alert(j.error||'Uložení selhalo.');return}
  D.vybrane=j.page.id;
  await nacti();
  var st2=document.getElementById('stav'); if(st2){st2.textContent='✓ Uloženo';setTimeout(function(){if(st2)st2.textContent=''},2500)}
}

async function smazat(id){
  if(!confirm('Opravdu smazat tuto stránku včetně jejích poptávek?'))return;
  var r = await fetch('/api/klienti/pages/smazat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})});
  var j = await r.json(); if(!r.ok){alert(j.error||'Smazání selhalo.');return}
  D.vybrane=null; nacti();
}

function kopiruj(){
  var t=document.getElementById('verejnaUrl').textContent;
  (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(function(){alert('Odkaz zkopírován:\n'+t)},function(){prompt('Zkopírujte odkaz:',t)});
}

/* ---------- poptávky ---------- */
function kresliLeady(){
  var pgName=function(id){var p=D.pages.find(function(x){return x.id===id});return p?p.nazev:'(smazaná stránka)'};
  document.getElementById('obsah').innerHTML = '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b style="font-size:15px">Poptávky od klientů ('+D.leads.length+')</b>'+
    (D.leads.length?'<button class="btn sek" onclick="exportCsv()">⬇ Export CSV</button>':'')+'</div>'+
    (D.leads.length ? '<div style="overflow-x:auto"><table><tr><th>Kdy</th><th>Kdo</th><th>Kontakt</th><th>Zájem</th><th>Stránka</th><th></th></tr>'+
      D.leads.map(function(l){return '<tr><td style="white-space:nowrap">'+datum(l.ts)+'</td>'+
        '<td><b>'+esc(l.jmeno)+'</b>'+(l.firma?'<br><small>'+esc(l.firma)+'</small>':'')+'</td>'+
        '<td>'+(l.email?esc(l.email)+'<br>':'')+esc(l.telefon||'')+'</td>'+
        '<td>'+esc((l.zajem||[]).join(', '))+(l.objem?'<br><small>Objem: '+esc(l.objem)+'</small>':'')+(l.termin?'<br><small>Termín: '+esc(l.termin)+'</small>':'')+(l.zprava?'<br><small>„'+esc(l.zprava)+'"</small>':'')+'</td>'+
        '<td>'+esc(pgName(l.pageId))+'</td>'+
        '<td><button class="mini" title="Smazat" onclick="smazLead(\''+l.id+'\')">×</button></td></tr>'}).join('')+
      '</table></div>'
    : '<div class="prazdno">Zatím žádné poptávky. Pošlete klientům odkaz na publikovanou stránku.</div>')+'</div>';
}
async function smazLead(id){
  if(!confirm('Smazat tuto poptávku?'))return;
  await fetch('/api/klienti/lead-smazat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})});
  nacti();
}
function exportCsv(){
  var head=['kdy','jmeno','firma','email','telefon','zajem','objem','termin','zprava','stranka'];
  var pgName=function(id){var p=D.pages.find(function(x){return x.id===id});return p?p.nazev:''};
  var cell=function(v){v=String(v==null?'':v);return '"'+v.replace(/"/g,'""')+'"'};
  var rows=[head.join(';')].concat(D.leads.map(function(l){return [datum(l.ts),l.jmeno,l.firma,l.email,l.telefon,(l.zajem||[]).join(', '),l.objem,l.termin,l.zprava,pgName(l.pageId)].map(cell).join(';')}));
  var blob=new Blob(['﻿'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='poptavky.csv';a.click();
}

nacti();
</script>
</body>
</html>
